apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ai-chatbot-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MAX_CONTEXT_MESSAGES
              value: "10"
          envFrom:
            - secretRef:
                name: llm-api-keys
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-chatbot
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
